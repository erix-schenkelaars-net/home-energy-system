services:
  energy-agent:
    build: .
    container_name: energy-agent
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - TZ=Europe/Amsterdam
      - MODE=shadow
      - LOG_LEVEL=INFO
      - AGENT_MODE=shadow
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - DAILY_RUN_HOUR=6
      - DAILY_RUN_MINUTE=30
    volumes:
      - ./logs:/app/logs
      - ./app/config.yaml:/app/config.yaml:ro
    ports:
      - "5052:5052"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
