# Energy Agent Configuration

# Agent settings
agent:
  mode: "shadow"  # shadow, advisor, or control
  model: "claude-3-5-sonnet-20241022"
  update_interval_seconds: 60

# Safety constraints
safety:
  min_soc_pct: 20.0
  max_soc_pct: 95.0
  max_charge_rate_kw: 3.0
  max_discharge_rate_kw: 2.5
  grid_import_max_kw: null

# Optimization objectives (priority order)
objectives:
  - max_self_consumption
  - min_grid_import_peak_hours
  - min_total_cost
  - battery_health

# MQTT topics mapping
mqtt:
  broker: "${MQTT_BROKER}:${MQTT_PORT}"  # not read by Python code — set in docker-compose env_file
  topics:
    growatt_status: "energy/growatt/status"
    p1_load: "energy/p1/status"
    battery_soc: "energy/battery/status"
    battery_voltage: "energy/battery/voltage"
    tariff_current: "energy/tariff/current"
    inverter_output: "energy/inverter/output"
    ev_charger: "energy/ev/status"

# Logging
logging:
  level: "INFO"
  file: "/app/logs/agent.log"
  max_size_mb: 10
  backup_count: 3

# API settings
api:
  host: "0.0.0.0"
  port: 5052
  debug: false

# Cloud/remote settings (future)
remote:
  enabled: false
  backup_to_pc: false
  pc_agent_url: "http://pc:8000"
